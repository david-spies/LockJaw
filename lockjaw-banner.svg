<svg width="100%" viewBox="0 0 680 220" role="img" xmlns="http://www.w3.org/2000/svg">
<title>LockJaw — Hybrid Encryption Messaging System</title>
<desc>Dark banner showing the LockJaw logo, padlock glyph, cipher pipeline, and tagline</desc>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="220" rx="6" fill="#0a0c0f"/>

<!-- Grid texture -->
<line x1="0" y1="40" x2="680" y2="40" stroke="#1a2030" stroke-width="0.5"/>
<line x1="0" y1="80" x2="680" y2="80" stroke="#1a2030" stroke-width="0.5"/>
<line x1="0" y1="120" x2="680" y2="120" stroke="#1a2030" stroke-width="0.5"/>
<line x1="0" y1="160" x2="680" y2="160" stroke="#1a2030" stroke-width="0.5"/>
<line x1="0" y1="200" x2="680" y2="200" stroke="#1a2030" stroke-width="0.5"/>
<line x1="80" y1="0" x2="80" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="160" y1="0" x2="160" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="240" y1="0" x2="240" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="320" y1="0" x2="320" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="400" y1="0" x2="400" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="480" y1="0" x2="480" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="560" y1="0" x2="560" y2="220" stroke="#1a2030" stroke-width="0.5"/>
<line x1="640" y1="0" x2="640" y2="220" stroke="#1a2030" stroke-width="0.5"/>

<!-- Left accent bar -->
<rect x="0" y="0" width="4" height="220" fill="#00e5ff"/>

<!-- Top accent line -->
<rect x="0" y="0" width="680" height="2" fill="#00e5ff" opacity="0.5"/>

<!-- Padlock glyph -->
<g transform="translate(38, 68)">
  <path d="M14 36 L14 20 Q14 6 28 6 Q42 6 42 20 L42 36" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round"/>
  <rect x="6" y="34" width="44" height="38" rx="4" fill="#0f1a2e" stroke="#00e5ff" stroke-width="2"/>
  <circle cx="28" cy="51" r="6" fill="none" stroke="#00e5ff" stroke-width="2"/>
  <rect x="25" y="55" width="6" height="9" rx="1" fill="#00e5ff"/>
  <circle cx="13" cy="41" r="2" fill="#1a3050"/>
  <circle cx="43" cy="41" r="2" fill="#1a3050"/>
  <circle cx="13" cy="65" r="2" fill="#1a3050"/>
  <circle cx="43" cy="65" r="2" fill="#1a3050"/>
</g>

<!-- Logotype -->
<text x="108" y="112" font-family="'Courier New', monospace" font-size="58" font-weight="700" fill="#00e5ff" letter-spacing="2">LOCK</text>
<text x="108" y="153" font-family="'Courier New', monospace" font-size="58" font-weight="700" fill="#ffffff" letter-spacing="2">JAW</text>
<rect x="108" y="118" width="232" height="2" fill="#00e5ff" opacity="0.3"/>

<!-- Version badge -->
<rect x="353" y="98" width="54" height="18" rx="2" fill="none" stroke="#2a3548" stroke-width="1"/>
<text x="380" y="111" font-family="'Courier New', monospace" font-size="10" fill="#556677" text-anchor="middle">v2.1.0</text>

<!-- Cipher pipeline label -->
<text x="500" y="38" font-family="'Courier New', monospace" font-size="10" fill="#556677" letter-spacing="2">CIPHER PIPELINE</text>

<!-- Pipeline: PLAINTEXT -->
<rect x="500" y="48" width="86" height="22" rx="2" fill="#0f1a2e" stroke="#2a3548" stroke-width="1"/>
<text x="542" y="62" font-family="'Courier New', monospace" font-size="10" fill="#8899aa" text-anchor="middle">PLAINTEXT</text>
<line x1="483" y1="92" x2="483" y2="100" stroke="#2a3548" stroke-width="1" marker-end="url(#arr)"/>

<!-- Pipeline: MORSE-ASCII -->
<rect x="500" y="78" width="86" height="22" rx="2" fill="#0f1a2e" stroke="#00e5ff" stroke-width="1"/>
<text x="542" y="92" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" text-anchor="middle">MORSE-ASCII</text>
<line x1="483" y1="122" x2="483" y2="130" stroke="#2a3548" stroke-width="1" marker-end="url(#arr)"/>

<!-- Pipeline: BEALE XOR -->
<rect x="500" y="108" width="86" height="22" rx="2" fill="#0f1a2e" stroke="#00e5ff" stroke-width="1"/>
<text x="542" y="122" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" text-anchor="middle">BEALE  XOR</text>
<line x1="483" y1="152" x2="483" y2="160" stroke="#2a3548" stroke-width="1" marker-end="url(#arr)"/>

<!-- Pipeline: AES-256-GCM -->
<rect x="500" y="138" width="86" height="22" rx="2" fill="#0f1a2e" stroke="#00e5ff" stroke-width="1"/>
<text x="542" y="152" font-family="'Courier New', monospace" font-size="10" fill="#00e5ff" text-anchor="middle">AES-256-GCM</text>
<line x1="483" y1="182" x2="483" y2="190" stroke="#2a3548" stroke-width="1" marker-end="url(#arr)"/>

<!-- Pipeline: BASE64 WIRE -->
<rect x="500" y="168" width="86" height="22" rx="2" fill="#0f1218" stroke="#39ff14" stroke-width="1"/>
<text x="542" y="182" font-family="'Courier New', monospace" font-size="10" fill="#39ff14" text-anchor="middle">BASE64  WIRE</text>

<!-- 2FA badge -->
<rect x="604" y="88" width="52" height="22" rx="2" fill="#0f1a2e" stroke="#ff6b35" stroke-width="1"/>
<text x="630" y="102" font-family="'Courier New', monospace" font-size="10" fill="#ff6b35" text-anchor="middle">2FA KEY</text>
<line x1="600" y1="96" x2="574" y2="116" stroke="#ff6b35" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr)"/>

<!-- Status pills -->
<g transform="translate(108, 168)">
  <rect x="0" y="0" width="82" height="17" rx="2" fill="#0a1520" stroke="#2a3548" stroke-width="1"/>
  <circle cx="10" cy="8.5" r="3" fill="#39ff14"/>
  <text x="18" y="13" font-family="'Courier New', monospace" font-size="9" fill="#556677">E2EE ACTIVE</text>
</g>
<g transform="translate(200, 168)">
  <rect x="0" y="0" width="78" height="17" rx="2" fill="#0a1520" stroke="#2a3548" stroke-width="1"/>
  <circle cx="10" cy="8.5" r="3" fill="#39ff14"/>
  <text x="18" y="13" font-family="'Courier New', monospace" font-size="9" fill="#556677">ZERO  TRUST</text>
</g>
<g transform="translate(288, 168)">
  <rect x="0" y="0" width="94" height="17" rx="2" fill="#0a1520" stroke="#2a3548" stroke-width="1"/>
  <circle cx="10" cy="8.5" r="3" fill="#39ff14"/>
  <text x="18" y="13" font-family="'Courier New', monospace" font-size="9" fill="#556677">NO  SERVER  KEY</text>
</g>

<!-- Tagline -->
<text x="108" y="205" font-family="'Courier New', monospace" font-size="11" fill="#3a4a60" letter-spacing="1">The server sees only noise. The keys live only with you.</text>

<!-- Corner brackets -->
<path d="M650 10 L670 10 L670 30" fill="none" stroke="#2a3548" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
<path d="M30 190 L10 190 L10 210" fill="none" stroke="#2a3548" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Right accent -->
<rect x="676" y="0" width="4" height="220" fill="#00e5ff" opacity="0.25"/>
</svg>
